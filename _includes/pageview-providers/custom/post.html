<script>
  document.addEventListener("DOMContentLoaded", function() {
    // 替换为你的 Windows 服务器公网 IP 或域名
    const API_URL = 'https://fuckyou.zuckertech.cn:3000/api/views';
    
    const pvElement = document.querySelector('.js-pageview');
    if (!pvElement) return;

    const pageKey = pvElement.getAttribute('data-page-key');

    // 发送 POST 请求，让该文章阅读量 +1
    fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ page_key: pageKey })
    })
    .then(res => res.json())
    .then(data => {
      if (data && data.view_count !== undefined) {
        pvElement.innerText = data.view_count;
      }
    })
    .catch(err => console.error('Increase pageview error:', err));
  });
</script>
